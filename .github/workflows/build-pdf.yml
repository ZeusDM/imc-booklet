name: Build IMC Booklet PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build LaTeX document (LuaLaTeX)
        uses: xu-cheng/latex-action@v4
        with:
          root_file: imc-booklet.tex
          latexmk_use_lualatex: true

      - name: Ensure PDF was produced
        run: test -s imc-booklet.pdf

      - name: Upload artifact (PDF)
        uses: actions/upload-artifact@v4
        with:
          name: imc-booklet-pdf
          path: imc-booklet.pdf

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: imc-booklet
          name: IMC Booklet build
          body: Automated build of imc-booklet.pdf from commit ${{ github.sha }}
          draft: false
          prerelease: true
          make_latest: true
          files: imc-booklet.pdf